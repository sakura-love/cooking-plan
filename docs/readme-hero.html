<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>料理计划 README Hero</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 1600px;
      height: 720px;
      overflow: hidden;
      font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans CJK SC", system-ui, sans-serif;
      background: #f7efe4;
      color: #241d19;
    }

    .hero {
      position: relative;
      width: 1600px;
      height: 720px;
      overflow: hidden;
      background:
        radial-gradient(circle at 88% 20%, rgba(46, 125, 91, 0.22), transparent 25%),
        radial-gradient(circle at 72% 88%, rgba(192, 138, 32, 0.2), transparent 32%),
        linear-gradient(132deg, #fff8ee 0%, #f6eadc 46%, #eef7ed 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.45;
      background-image:
        linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.25) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(90deg, #000 0%, rgba(0,0,0,0.75) 52%, transparent 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 690px 1fr;
      height: 100%;
      padding: 76px 86px 70px 92px;
      gap: 42px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 44px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 74px;
      height: 74px;
      border-radius: 22px;
      color: #fff7ec;
      background: linear-gradient(145deg, #d24e38, #bf3f2f);
      box-shadow: 0 18px 40px rgba(191, 63, 47, 0.24);
      font-size: 36px;
      font-weight: 900;
    }

    .brand-name {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .brand-sub {
      margin-top: 4px;
      color: #6b5d54;
      font-size: 18px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      max-width: 650px;
      font-size: 72px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 950;
    }

    .accent {
      color: #c94f3b;
    }

    .lead {
      margin: 28px 0 0;
      max-width: 610px;
      color: #5f524a;
      font-size: 28px;
      line-height: 1.55;
      font-weight: 700;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 44px;
      max-width: 630px;
    }

    .chip {
      padding: 13px 20px;
      border-radius: 999px;
      border: 2px solid rgba(191, 63, 47, 0.16);
      background: rgba(255, 255, 255, 0.58);
      color: #4d4038;
      font-size: 20px;
      font-weight: 850;
      box-shadow: 0 10px 26px rgba(99, 72, 53, 0.08);
    }

    .chip.green {
      border-color: rgba(46, 125, 91, 0.18);
      color: #2e7d5b;
    }

    .chip.gold {
      border-color: rgba(192, 138, 32, 0.18);
      color: #9a6c10;
    }

    .phones {
      position: relative;
      height: 100%;
    }

    .phone {
      position: absolute;
      width: 286px;
      height: 638px;
      border-radius: 44px;
      padding: 12px;
      background: linear-gradient(145deg, #fffaf2, #eee2d5);
      box-shadow:
        0 30px 70px rgba(80, 55, 38, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.86);
      overflow: hidden;
    }

    .phone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 34px;
      display: block;
    }

    .phone.main {
      right: 280px;
      top: 0;
      width: 312px;
      height: 696px;
      z-index: 3;
      transform: rotate(-4deg);
    }

    .phone.left {
      right: 515px;
      top: 62px;
      z-index: 2;
      transform: rotate(-12deg) scale(0.9);
      opacity: 0.92;
    }

    .phone.right {
      right: 42px;
      top: 78px;
      z-index: 1;
      transform: rotate(9deg) scale(0.9);
      opacity: 0.95;
    }

    .float-card {
      position: absolute;
      right: 18px;
      bottom: 42px;
      z-index: 4;
      width: 300px;
      border-radius: 28px;
      padding: 22px 24px;
      background: rgba(255, 250, 242, 0.84);
      border: 1px solid rgba(117, 88, 62, 0.15);
      box-shadow: 0 24px 60px rgba(67, 47, 32, 0.18);
      backdrop-filter: blur(16px);
    }

    .float-title {
      color: #2e7d5b;
      font-size: 22px;
      font-weight: 950;
    }

    .float-text {
      margin-top: 8px;
      color: #5d5048;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 700;
    }

    .stats {
      display: flex;
      gap: 18px;
      margin-top: 22px;
    }

    .stat strong {
      display: block;
      color: #c94f3b;
      font-size: 26px;
      line-height: 1;
      font-weight: 950;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: #7a6c62;
      font-size: 14px;
      font-weight: 800;
    }

    .ribbon {
      position: absolute;
      left: 92px;
      bottom: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #6c5d53;
      font-size: 18px;
      font-weight: 800;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d24e38;
      box-shadow: 18px 0 0 #2e7d5b, 36px 0 0 #c08a20;
      margin-right: 40px;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="grain"></div>
    <section class="content">
      <div>
        <div class="brand">
          <div class="logo">料</div>
          <div>
            <div class="brand-name">料理计划</div>
            <div class="brand-sub">Cooking Plan for Android</div>
          </div>
        </div>

        <h1>把做饭变成<br><span class="accent">可执行任务</span></h1>
        <p class="lead">离线菜谱、步骤勾选、烹饪计时、每周三餐计划和买菜清单，串成一个真正能下厨的流程。</p>

        <div class="chips">
          <div class="chip">200+ 离线菜谱</div>
          <div class="chip green">任务式步骤</div>
          <div class="chip gold">烹饪计时器</div>
          <div class="chip green">每周三餐计划</div>
          <div class="chip">自动买菜清单</div>
          <div class="chip gold">AI 菜谱生成</div>
        </div>
      </div>

      <div class="phones">
        <div class="phone left">
          <img src="./screenshots/home.png" alt="首页">
        </div>
        <div class="phone main">
          <img src="./screenshots/recipe-timer.png" alt="计时器">
        </div>
        <div class="phone right">
          <img src="./screenshots/daily-shopping-list.png" alt="买菜清单">
        </div>
        <div class="float-card">
          <div class="float-title">从找菜到买菜，一次打通</div>
          <div class="float-text">先选菜，再排计划，最后自动汇总当天食材。</div>
          <div class="stats">
            <div class="stat"><strong>234</strong><span>道菜谱</span></div>
            <div class="stat"><strong>8</strong><span>项待买</span></div>
            <div class="stat"><strong>1.2.8</strong><span>版本</span></div>
          </div>
        </div>
      </div>
    </section>

    <div class="ribbon">
      <span class="dot"></span>
      Kotlin · Jetpack Compose · Material 3 · Room · Hilt
    </div>
  </main>
</body>
</html>
