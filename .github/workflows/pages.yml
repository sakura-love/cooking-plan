name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "README.md"
      - "LICENSE"
      - "docs/**"
      - "releases/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site/docs site/releases
          cp index.html site/
          cp README.md site/
          cp LICENSE site/
          cp -R docs/. site/docs/
          cp releases/料理计划-v1.2.8.apk site/releases/
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
